name: Deploy production to Vercel

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_ycAcRGoaNcu7MVAPWxg4zw30
      VERCEL_PROJECT_ID: prj_fPhileI4iCM7LeOxOVB20ZcaioWJ
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel configuration
        run: npx --yes vercel@54.20.1 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: npx --yes vercel@54.20.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy
        run: npx --yes vercel@54.20.1 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
